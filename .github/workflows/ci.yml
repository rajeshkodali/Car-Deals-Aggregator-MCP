name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level least-privilege. Individual jobs can widen if they need to.
permissions:
  contents: read

jobs:
  tests:
    name: tests (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the active LTS line and the current. The codebase uses
        # `global.fetch` (Node 18+) and ESM-friendly CommonJS that's stable
        # back to Node 20.
        node-version: ['20', '22']
    steps:
      # Pinned SHAs prevent a compromised tag from injecting code into our
      # CI. Bumps come through Dependabot which validates SHA + version.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git pushes / PR creation in this workflow; don't leave
          # GITHUB_TOKEN in the runner's git config.
          persist-credentials: false

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # `npm ci` enforces an exact match against package-lock.json — a
      # supply-chain guardrail. CI fails if the lockfile is out of sync
      # rather than silently resolving to whatever's latest.
      - name: Install
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v6.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      # Syntax-check every committed JS file under src/ and test/.
      # We don't ship a heavyweight linter (eslint) yet — `node --check`
      # catches parse errors and provides a fast smoke without
      # introducing a config-tuning project of its own.
      - name: node --check
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            node --check "$f"
          done < <(find src test -name '*.js' -type f -print0)

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v6.0.0
        with:
          node-version: '22'
          cache: npm

      # `npm audit --omit=dev --audit-level=high` only fails on HIGH or
      # CRITICAL findings in runtime deps. Dev/test-only findings get
      # surfaced via the Dependabot weekly run rather than blocking PRs.
      - name: Audit production deps (high+)
        run: npm audit --omit=dev --audit-level=high
