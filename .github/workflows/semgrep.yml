name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 09:00 UTC — staggered from CodeQL (Mondays) so the
    # security signal lands on different days of the week.
    - cron: '0 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: returntocorp/semgrep@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Curated rule packs:
      #   p/javascript       — JavaScript-specific bugs and security issues
      #   p/nodejsscan       — Node.js-specific patterns (path traversal,
      #                        SSRF, prototype pollution)
      #   p/security-audit   — broad security audit rules
      #   p/owasp-top-ten    — OWASP Top 10 patterns
      #   p/cwe-top-25       — CWE Top 25 most dangerous weaknesses
      - name: Run Semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/javascript
            p/nodejsscan
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
