name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Wednesday 09:00 UTC — staggered from CodeQL (Mondays) and
    # njsscan (Tuesdays) so the security signal lands on different days
    # of the week.
    - cron: '0 9 * * 3'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    # Skip Dependabot PRs — they don't need a fresh scan, and the token
    # they get can't write security-events anyway.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container:
      # Semgrep ships an image with the CLI + rule cache pre-installed.
      # Pinned by digest so a compromised tag can't inject code into CI.
      image: returntocorp/semgrep@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      # Curated rule packs that complement njsscan (which already covers
      # p/nodejsscan):
      #   p/javascript     — JavaScript-specific bugs and security issues
      #   p/security-audit — broad cross-language security audit rules
      #   p/owasp-top-ten  — OWASP Top 10 patterns
      #   p/cwe-top-25     — CWE Top 25 most dangerous weaknesses
      # SARIF uploads to the Security tab below.
      - name: Run Semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/javascript
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25

      - name: Upload SARIF to GitHub Security tab
        if: always()  # upload even on findings-fail so they show up
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep
