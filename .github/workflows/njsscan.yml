name: njsscan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 09:00 UTC — staggered from CodeQL (Mondays) so the
    # security signal lands on different days of the week.
    - cron: '0 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  njsscan:
    name: njsscan
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      # njsscan ships its own curated Node.js ruleset and uses Semgrep as
      # an embedded semantic-grep engine. Both must be installed — without
      # `semgrep` on PATH the semantic-grep phase crashes (verified locally
      # against the same image setup-python provides).
      - name: Install njsscan and Semgrep CLI
        run: python -m pip install --upgrade pip njsscan semgrep

      - name: Run njsscan
        run: njsscan . --sarif -o njsscan.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: njsscan.sarif
          category: njsscan
