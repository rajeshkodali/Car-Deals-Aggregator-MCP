name: njsscan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 09:00 UTC — staggered from CodeQL (Mondays) so the
    # security signal lands on different days of the week.
    - cron: '0 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  njsscan:
    name: njsscan
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      # njsscan ships its own curated Node.js ruleset and uses Semgrep as
      # an embedded semantic-grep engine. Both must be installed — without
      # `semgrep` on PATH the semantic-grep phase crashes (verified locally
      # against the same image setup-python provides).
      - name: Install njsscan and Semgrep CLI
        run: python -m pip install --upgrade pip njsscan semgrep

      - name: Run njsscan
        run: njsscan . --sarif -o njsscan.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: njsscan.sarif
          category: njsscan
